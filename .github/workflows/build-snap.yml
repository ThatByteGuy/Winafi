name: Build Snap

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  build:
    name: Build Snap
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare snapcraft metadata
        run: |
          cp snap/snapcraft.yaml snapcraft.yaml
          sed -i "s/^version:.*/version: '${{ inputs.version }}'/" snapcraft.yaml
          sed -i "s/- -DWINAFI_BUILD_VERSION=.*/- -DWINAFI_BUILD_VERSION=${{ inputs.version }}/" snapcraft.yaml

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snapcraft

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: snap
          path: ${{ steps.snapcraft.outputs.snap }}
          retention-days: 1
