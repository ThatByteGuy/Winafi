name: Build Debian Package

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  build:
    name: Build deb Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake pkg-config ruby-dev \
            qtbase5-dev libqt5widgets5 libqt5core5a \
            libudev-dev libparted-dev libarchive-dev \
            libcdio-dev libssl-dev libcurl4-openssl-dev

      - name: Install FPM
        run: sudo gem install fpm

      - name: Build Debian package
        run: bash scripts/build-deb.sh "${{ inputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: "winafi_*.deb"
          retention-days: 1
