name: winafi
base: core22
version: '0.0.5'
summary: USB bootable drive utility for Linux
description: |
  Winafi is a utility for creating bootable USB drives from ISO files,
  with support for Windows and Linux distributions.

grade: stable
confinement: classic

apps:
  winafi:
    command: usr/bin/winafi
    plugs:
      - hardware-observe
      - block-devices
      - system-observe
  winafi-gui:
    command: usr/bin/winafi-gui
    plugs:
      - hardware-observe
      - block-devices
      - system-observe
      - x11
      - wayland
      - desktop
    desktop: usr/share/applications/winafi.desktop

parts:
  winafi:
    plugin: cmake
    source: .
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DBUILD_GUI=ON
      - -DBUILD_TESTS=OFF
      - -DWINAFI_BUILD_VERSION=0.0.5
    build-packages:
      - build-essential
      - cmake
      - pkg-config
      - qtbase5-dev
      - libudev-dev
      - libparted-dev
      - libarchive-dev
      - libcdio-dev
      - libssl-dev
      - libcurl4-openssl-dev
    override-build: |
      snapcraftctl build
      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/share/applications
      cat > $SNAPCRAFT_PART_INSTALL/usr/share/applications/winafi.desktop << 'EOF'
      [Desktop Entry]
      Type=Application
      Name=Winafi
      Comment=USB bootable drive utility for Linux
      Exec=winafi-gui
      Icon=application-x-executable
      Categories=Utility;System;
      Terminal=false
      EOF
    stage-packages:
      - libqt5widgets5
      - libudev1
      - libparted2
      - libarchive13
      - libcdio19
      - libssl3
      - libcurl4
