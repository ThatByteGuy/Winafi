name: Build RPM Package

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  build:
    name: Build RPM Package
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          dnf install -y \
            gcc gcc-c++ make cmake pkg-config ruby-devel \
            qt5-qtbase-devel \
            systemd-devel parted-devel libarchive-devel \
            libcdio-devel openssl-devel libcurl-devel \
            rpm-build

      - name: Install FPM
        run: gem install fpm

      - name: Build RPM package
        run: bash scripts/build-rpm.sh "${{ inputs.version }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm
          path: "winafi-*.rpm"
          retention-days: 1
